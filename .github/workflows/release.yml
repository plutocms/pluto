name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type (auto-detected from conventional commits if not set)
        required: false
        default: ''
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # push commits, create tags & GitHub releases
      id-token: write # npm provenance attestation

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required by changelogen to read all commits

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint || true

      - name: Test
        run: bun test || true

      # Bump version and changelog, but do NOT push or create release yet
      - name: Bump version and generate changelog
        id: changelogen_bump
        run: |
          BUMP="${{ inputs.bump }}"
          if [ -n "$BUMP" ]; then
            npx changelogen@latest --$BUMP
          else
            npx changelogen@latest --bump
          fi

      - name: Publish to npm
        id: npm_publish
        run: npm publish --provenance --access public

      # Only push commit/tag and create GitHub release if publish succeeds
      - name: Push commit and tags, create GitHub release
        if: steps.npm_publish.outcome == 'success'
        run: |
          git push --follow-tags origin HEAD
          npx changelogen@latest --release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

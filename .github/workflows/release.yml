name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type (auto-detected from conventional commits if not set)
        required: false
        default: ''
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # push commits, create tags & GitHub releases
      id-token: write # npm provenance attestation

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required by changelogen to read all commits

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint || true

      - name: Test
        run: bun test || true

      # changelogen reads conventional commits, bumps package.json, writes CHANGELOG.md,
      # commits, tags, pushes, and creates the GitHub release — all in one step.
      - name: Bump version, generate changelog & create release
        run: |
          BUMP="${{ inputs.bump }}"
          if [ -n "$BUMP" ]; then
            npx changelogen@latest --$BUMP --push --release
          else
            npx changelogen@latest --bump --push --release
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npm publish --provenance --access public

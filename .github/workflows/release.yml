name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type (auto-detected from conventional commits if not set)
        required: false
        default: ''
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required by changelogen to read all commits

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint || true

      - name: Test
        run: bun test || true

      # Bump package.json, update CHANGELOG.md, and commit — but do NOT push or release
      - name: Bump version and generate changelog
        run: |
          BUMP="${{ inputs.bump }}"
          if [ -n "$BUMP" ]; then
            npx changelogen@latest --$BUMP
          else
            npx changelogen@latest --bump
          fi

      # Create a release branch from the changelogen commit and open a PR
      - name: Create release PR
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BRANCH="release/v$VERSION"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          gh pr create \
            --title "v$VERSION" \
            --body "Release v$VERSION" \
            --base main \
            --head "$BRANCH"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
